name: Jscrambler Code Integrity

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # 1. Changed "npm ci" to "npm install" so it never crashes on missing lockfiles
      - run: npm install --no-audit --no-fund
      
      - name: Jscrambler Code Integrity
        id: jscrambler
        uses: jscrambler/code-integrity-actions/protect@v6
        with:
          application-id: ${{ secrets.JSCRAMBLER_APPLICATION_ID }}  
          secret-key: ${{ secrets.JSCRAMBLER_SECRET_KEY }}          
          access-key: ${{ secrets.JSCRAMBLER_ACCESS_KEY }}          
          jscrambler-config-path: jscrambler.json                    
          # 2. Pointing directly to your test file instead of a /dist folder
          files-src: |
            app.js
          # 3. Saving the scrambled file into a protected folder so you can see it
          files-dest: dist-protected/
          
      # 4. Upload the scrambled code as a zip file so you can download and inspect it from GitHub!
      - name: Upload Protected Files
        uses: actions/upload-artifact@v4
        with:
          name: obfuscated-code
          path: dist-protected/
